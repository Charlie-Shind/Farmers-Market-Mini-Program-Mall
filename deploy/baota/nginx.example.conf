# =============================================================
# 宝塔 Nginx 配置示例
# 站点：admin.你的域名.com
# 在宝塔「网站 → 设置 → 配置文件」中参考修改
# =============================================================

server {
    listen 80;
    server_name admin.你的域名.com;

    # 管理后台静态文件（admin 构建产物）
    root /www/wwwroot/farm/admin;
    index index.html;

    # 管理后台前端（Vue Router history 模式）
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    location = /admin {
        return 301 /admin/;
    }

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:6002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 本地上传文件（若未使用 MinIO）
    location /uploads/ {
        proxy_pass http://127.0.0.1:6002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    access_log /www/wwwlogs/farm-admin.access.log;
    error_log  /www/wwwlogs/farm-admin.error.log;
}

# 若小程序 API 使用独立域名 api.你的域名.com，可再加一个 server 块：
