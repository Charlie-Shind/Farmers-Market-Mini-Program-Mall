<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>湾源农仓 - 微信手机号登录</title>
  <link rel="stylesheet" href="./01-登录注册页.css" />
</head>
<body>
  <main class="app-page">
    <header class="status-bar">
      <span>9:41</span>
      <div class="status-right" aria-hidden="true">
        <span class="signal"><i></i><i></i><i></i><i></i></span>
        <span>5G</span>
        <span class="battery"><i></i></span>
      </div>
    </header>

    <nav class="nav-bar">
      <button class="back-btn" type="button" aria-label="返回">
        <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6" /></svg>
      </button>
      <strong>登录 / 注册</strong>
      <span></span>
    </nav>

    <!-- 顶部只保留 Brand，不再放大 Banner，避免抢登录按钮视觉中心 -->
    <section class="brand-section">
      <div class="brand-logo">
        <span class="logo-mark">湾</span>
        <span class="logo-text">
          <strong>湾源农仓</strong>
          <em>产地直供 · 新鲜到家</em>
        </span>
      </div>
    </section>

    <section class="login-panel">
      <div class="login-title">
        <h1>微信手机号快捷登录</h1>
        <p>使用微信绑定手机号，快速完成注册或登录</p>
      </div>

      <div class="phone-preview">
        <div class="phone-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <rect x="7" y="3" width="10" height="18" rx="2.4" />
            <path d="M10 6h4M11 18h2" />
          </svg>
        </div>
        <div>
          <strong>微信手机号</strong>
          <span>点击下方按钮后由微信授权确认</span>
        </div>
      </div>

      <!-- 微信小程序真实写法示例：
      <button class="primary-btn" open-type="getPhoneNumber" bindgetphonenumber="onGetPhoneNumber">
        微信手机号一键登录
      </button>
      -->
      <button class="primary-btn breathe" type="button">
        <span class="wechat-symbol" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M9.3 5.4C5.6 5.4 2.7 7.8 2.7 10.8c0 1.7.9 3.2 2.4 4.2l-.6 2 2.2-1.1c.8.2 1.7.4 2.6.4h.7c-.1-.4-.2-.8-.2-1.2 0-2.8 2.7-5 6.1-5h.4c-.5-2.7-3.4-4.7-7-4.7Z" />
            <path d="M16.1 11.3c-2.9 0-5.2 1.9-5.2 4.2s2.3 4.2 5.2 4.2c.7 0 1.3-.1 1.9-.3l1.8.9-.5-1.5c1.2-.8 1.9-2 1.9-3.3 0-2.3-2.3-4.2-5.1-4.2Z" />
          </svg>
        </span>
        微信手机号一键登录
      </button>

      <label class="agree-row">
        <input type="checkbox" checked />
        <span>我已阅读并同意 <a href="#">《用户协议》</a>、<a href="#">《隐私政策》</a>，授权获取微信手机号用于登录注册。</span>
      </label>
    </section>

    <div class="login-link-row" aria-label="其他登录方式">
      <a href="#">其他手机号登录</a>
      <i></i>
      <a href="#">暂不登录，先逛逛</a>
    </div>

    <footer class="safe-footer">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l7 3v5c0 4.4-2.9 8.4-7 10-4.1-1.6-7-5.6-7-10V6l7-3Z"/><path d="M9 12l2 2 4-4"/></svg>
      微信安全能力保护 · 湾源农仓认证服务
    </footer>
  </main>

</body>
</html>
