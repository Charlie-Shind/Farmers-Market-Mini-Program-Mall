<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>库存调整 - 湾源农仓商户端</title><link rel="stylesheet" href="mini_b.css"></head><body><div class="phone"><div class="status"><span>9:41</span><span>5G  ◉</span></div><header class="header"><a class="back" href="javascript:history.back()">‹</a><div class="title"><h1>库存调整</h1><p>快速增减库存并记录原因</p></div></header><main class="content no-tab">
<section class="card"><div class="section-title"><h2>商品信息</h2><span class="tag">出售中</span></div><div class="item-head"><div class="thumb green"></div><div class="item-main"><strong>山野香米 10kg 家庭装</strong><p>当前安全库存：50 件，当前库存低于预警线。</p></div></div></section>
<section class="card" style="text-align:center"><p style="margin:0;color:var(--muted);font-size:12px">当前库存</p><strong style="display:block;font-size:46px;color:var(--green);margin:6px 0">12</strong><span class="tag red">库存预警</span></section>
<section class="card"><div class="form"><div class="field"><label>调整方式</label><select class="select"><option>增加库存</option><option>减少库存</option></select></div><div class="field"><label>调整数量</label><input class="input" value="100" type="number"></div><div class="field"><label>调整原因</label><select class="select"><option>新批次入库</option><option>盘点修正</option><option>损耗扣减</option></select></div><div class="field"><label>备注</label><textarea class="textarea" placeholder="填写库存调整说明"></textarea></div></div></section>
<div class="sticky-bottom"><button class="btn">确认调整库存</button></div>
</main></div></body></html>
