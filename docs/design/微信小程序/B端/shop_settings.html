<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>店铺设置 - 湾源农仓商户端</title><link rel="stylesheet" href="mini_b.css"></head><body><div class="phone"><div class="status"><span>9:41</span><span>5G  ◉</span></div><header class="header"><div class="title"><h1>店铺设置</h1><p>基础资料、资质与产地信息配置</p></div></header><main class="content no-tab">
<section class="notice">店铺资料会影响用户侧展示与平台审核，请确保营业执照、产地说明和联系方式真实有效。</section>
<section class="card"><div class="section-title"><h2>审核状态</h2><span class="tag gold">待补充资料</span></div><p style="color:var(--muted);font-size:13px;line-height:1.6">产地证明图片不清晰，请重新上传后提交审核。</p><a class="btn ghost" href="qualification_audit.html">查看审核详情</a></section>
<section class="card"><div class="section-title"><h2>店铺基础资料</h2></div><div class="form"><div class="field"><label>店铺名称</label><input class="input" value="东山果蔬合作社"></div><div class="field"><label>经营类目</label><select class="select"><option>时令果蔬</option><option>肉禽蛋奶</option><option>粮油干货</option></select></div><div class="field"><label>联系电话</label><input class="input" value="138****8899"></div><div class="field"><label>店铺简介</label><textarea class="textarea">湾源县东山产区直采，主营脐橙、番茄、时令蔬菜。</textarea></div></div></section>
<section class="card"><div class="section-title"><h2>资质上传</h2><small>营业执照/产地证明</small></div><div class="upload-grid"><div class="upload">营业执照<br>已上传</div><div class="upload">产地证明<br>重新上传</div><div class="upload">检测报告<br>＋上传</div></div></section>
<section class="card"><div class="section-title"><h2>产地信息</h2></div><div class="form"><div class="field"><label>产地地址</label><input class="input" value="湾源县东山社区生态果园基地"></div><div class="field"><label>产地说明</label><textarea class="textarea">基地采用人工分拣、冷链直发，支持溯源码绑定。</textarea></div></div></section>
<div class="sticky-bottom"><button class="btn ghost">保存草稿</button><button class="btn">重新提交审核</button></div>
</main></div></body></html>
