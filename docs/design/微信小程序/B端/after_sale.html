<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>售后处理 - 湾源农仓商户端</title><link rel="stylesheet" href="mini_b.css"></head><body><div class="phone"><div class="status"><span>9:41</span><span>5G  ◉</span></div><header class="header"><a class="back" href="javascript:history.back()">‹</a><div class="title"><h1>售后处理</h1><p>审核退款、拒绝或补充材料</p></div></header><main class="content no-tab">
<section class="card"><div class="row"><div><strong>退款申请</strong><p style="margin:5px 0 0;color:var(--muted);font-size:12px">订单号 WY202606070021</p></div><span class="tag red">待商家处理</span></div></section>
<section class="card"><div class="section-title"><h2>售后原因</h2></div><p style="font-size:14px;line-height:1.7;margin:0">收到后发现部分番茄挤压破损，申请部分退款。</p><div class="meta-row"><span class="tag red">申请金额 ¥12.00</span><span class="tag">仅退款</span></div></section>
