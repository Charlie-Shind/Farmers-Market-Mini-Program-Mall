<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>湾源农仓 - 修改个人资料</title>
  <link rel="stylesheet" href="21-个人资料页.css" />
</head>
<body>
  <main class="phone-page edit-page">
    <header class="status-bar">
      <span>9:41</span>
      <span>5G · 100%</span>
    </header>

    <nav class="edit-nav">
      <a class="round-btn" href="21-个人资料页.html">‹</a>
      <strong>修改个人资料</strong>
      <span></span>
    </nav>

    <section class="info-card avatar-edit-card">
      <div class="avatar-large">
        <img src="https://images.unsplash.com/photo-1607746882042-944635dfe10e?auto=format&fit=crop&w=240&q=80" alt="头像" />
        <button type="button">更换头像</button>
      </div>
    </section>

    <section class="info-card form-card">
      <label class="form-item">
        <span>显示名称</span>
        <input value="东山果蔬合作社" />
      </label>
      <label class="form-item">
        <span>身份类型</span>
        <select>
          <option>商户 / 农户</option>
          <option>C端普通用户</option>
          <option>社区团长</option>
        </select>
      </label>
      <label class="form-item">
        <span>联系人</span>
        <input value="刘经理" />
      </label>
      <label class="form-item">
        <span>手机号</span>
        <input value="138****8899" />
      </label>
      <label class="form-item">
        <span>所在地区</span>
        <input value="湾源县 · 东山社区" />
      </label>
      <label class="form-item full">
        <span>个人简介</span>
        <textarea>本地果蔬合作社负责人，主营湾源脐橙、自然成熟番茄和时令蔬菜。</textarea>
      </label>
    </section>

    <section class="info-card tip-card">
      <strong>资料展示说明</strong>
      <p>C 端可显示昵称、头像、地区、收藏偏好；B 端可显示店铺名称、联系人、资质状态、经营简介。敏感信息默认脱敏展示。</p>
    </section>

    <div class="bottom-safe"></div>
    <footer class="submit-bar">
      <a class="ghost" href="21-个人资料页.html">取消</a>
      <a class="primary" href="21-个人资料页.html">保存资料</a>
    </footer>
  </main>
</body>
</html>
