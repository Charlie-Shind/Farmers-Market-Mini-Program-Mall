<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>湾源农仓 - 商品分类</title>
  <link rel="stylesheet" href="./02-商品分类页.css" />
</head>
<body>
  <main class="phone-page">
    <header class="status-bar">
      <strong>9:41</strong>
      <div class="status-icons"><span></span><span></span><span></span></div>
    </header>

    <section class="page-title-bar">
      <button class="back-btn" type="button">‹</button>
      <h1>商品分类</h1>
      <span></span>
    </section>

    <section class="header-card">
      <small>按品类找好货</small>
      <h2>产地鲜货，一键进入分类</h2>
      <p>点击下方分类图标，进入对应分类板块，查看该类商品列表。</p>
    </section>

    <section class="section-head">
      <h2>全部分类</h2>
      <span>8 个入口</span>
    </section>

    <section class="category-grid" aria-label="商品分类入口">
      <a class="category-tile fruit" href="02-商品分类页-板块.html?cat=fruit">
        <div class="category-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 21c-3 0-5.4-2.3-5.4-5.5C6.6 10.2 12 5 12 5s5.4 5.2 5.4 10.5C17.4 18.7 15 21 12 21Z"/>
            <path d="M12 8v9"/>
            <path d="M14 4c1.4-.8 2.7-.8 4 0-.3 1.6-1.3 2.7-3 3"/>
          </svg>
        </div>
        <strong>时令果蔬</strong><small>鲜果蔬菜</small>
      </a>
      <a class="category-tile meat" href="02-商品分类页-板块.html?cat=meat">
        <div class="category-icon">
          <svg viewBox="0 0 24 24">
            <path d="M4 14c2.4-2.6 4.8-4 8-4s5.6 1.4 8 4"/>
            <path d="M7 14c0 3 2.2 5 5 5s5-2 5-5"/>
            <path d="M9 9c1-1.7 2.2-2.8 3-3.5 1 .9 2.1 2.1 3 3.5"/>
          </svg>
        </div>
        <strong>肉禽蛋奶</strong><small>刚需生鲜</small>
      </a>
      <a class="category-tile rice" href="02-商品分类页-板块.html?cat=rice">
        <div class="category-icon">
          <svg viewBox="0 0 24 24">
            <path d="M6 19h12"/>
            <path d="M8 19V8l4-2 4 2v11"/>
            <path d="M10 19v-4h4v4"/>
            <path d="M9 12h6"/>
          </svg>
        </div>
        <strong>粮油干货</strong><small>家庭囤货</small>
      </a>
      <a class="category-tile gift" href="02-商品分类页-板块.html?cat=gift">
        <div class="category-icon">
          <svg viewBox="0 0 24 24">
            <path d="M5 9h14v11H5z"/>
            <path d="M4 9h16"/>
            <path d="M12 9v11"/>
            <path d="M12 9c0-3-2-5-4-5-1.2 0-2.4.8-2.4 2.2C5.6 8 7.3 9 9 9"/>
            <path d="M12 9c0-3 2-5 4-5 1.2 0 2.4.8 2.4 2.2C18.4 8 16.7 9 15 9"/>
          </svg>
        </div>
        <strong>特产礼盒</strong><small>送礼团购</small>
      </a>
      <a class="category-tile organic" href="02-商品分类页-板块.html?cat=organic">
        <div class="category-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 21s7-4.4 7-11V5l-7-3-7 3v5c0 6.6 7 11 7 11Z"/>
            <path d="m8.8 12 2 2 4.6-5"/>
          </svg>
        </div>
        <strong>有机认证</strong><small>认证优选</small>
      </a>
      <a class="category-tile origin" href="02-商品分类页-板块.html?cat=origin">
        <div class="category-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 21s6-5.1 6-11a6 6 0 1 0-12 0c0 5.9 6 11 6 11Z"/>
            <circle cx="12" cy="10" r="2.2"/>
            <path d="M4 22h16"/>
          </svg>
        </div>
        <strong>产地直供</strong><small>源头直采</small>
      </a>
      <a class="category-tile presale" href="02-商品分类页-板块.html?cat=presale">
        <div class="category-icon">
          <svg viewBox="0 0 24 24">
            <path d="M7 3h10"/>
            <path d="M9 3v5l-4 8a4 4 0 0 0 3.6 5h6.8A4 4 0 0 0 19 16l-4-8V3"/>
            <path d="M8 15h8"/>
          </svg>
        </div>
        <strong>预售商品</strong><small>预约发货</small>
      </a>
      <a class="category-tile veg" href="02-商品分类页-板块.html?cat=local">
        <div class="category-icon">
          <svg viewBox="0 0 24 24">
            <path d="M4 18h16"/>
            <path d="M5 15c1.4-4.3 4.7-7 7-7s5.6 2.7 7 7"/>
            <path d="M12 8V4"/>
            <path d="M9 5h6"/>
          </svg>
        </div>
        <strong>同城配送</strong><small>社区鲜达</small>
      </a>
    </section>

    <section class="tip-card">
      <i>✓</i>
      <div><strong>分类只做入口，不堆内容</strong><p>点进分类后再展示商品列表，页面层级更干净，也更符合小程序分类页使用习惯。</p></div>
    </section>

    <nav class="tabbar">
      <a><i>⌂</i><span>首页</span></a>
      <a class="active"><i>▦</i><span>分类</span></a>
      <a><i>◉</i><span>发现</span></a>
      <a class="cart"><b>2</b><i>⌗</i><span>购物车</span></a>
      <a><i>♙</i><span>我的</span></a>
    </nav>
  </main>
</body>
</html>
