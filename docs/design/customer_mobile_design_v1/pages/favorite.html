<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>我的收藏</title>
<link rel="stylesheet" href="../styles/tokens.css" />
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<svg style="display:none"><defs></defs></svg>
<div class="page ">
  <!-- 页面头部：后续转小程序时映射为 page-title-bar，保留返回按钮和右侧动作区 -->
  <div class="topbar">
    <button class="icon-btn" data-action="返回上一页"><svg class="icon"><use href="../assets/icons.svg#back"></use></svg></button>
    <div class="title">我的收藏</div>
    <div class="right"></div>
  </div>

  <div class="tabs"><div class="tab active">商品</div><div class="tab">店铺</div><div class="tab">失效</div></div>
  <div class="section">
    <div class="goods-row">
  <img class="goods-img" src="../assets/goods/gift.svg" alt="山野特产礼盒" />
  <div>
    <div class="goods-title">山野特产礼盒</div>
    <div class="goods-sub">收藏于 06-18 · 支持企业团购</div>
    <div class="goods-meta"><span class="price">¥128.00</span><span></span></div>
    <div class="btn-row" style="margin-top:10px"><button class="btn ghost" data-action="取消收藏">取消收藏</button><button class="btn primary" data-action="加入购物车">加入购物车</button></div>
  </div>
</div>
    <div class="goods-row">
  <img class="goods-img" src="../assets/goods/tea.svg" alt="明前春茶尝鲜装" />
  <div>
    <div class="goods-title">明前春茶尝鲜装</div>
    <div class="goods-sub">收藏于 06-16 · 春茶季限定</div>
    <div class="goods-meta"><span class="price">¥88.00</span><span></span></div>
    <div class="btn-row" style="margin-top:10px"><button class="btn ghost" data-action="取消收藏">取消收藏</button><button class="btn primary" data-action="购买">购买</button></div>
  </div>
</div>
  </div>

</div>
<script src="../scripts/prototype.js"></script>
</body>
</html>
