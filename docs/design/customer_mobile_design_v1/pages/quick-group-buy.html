<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>拼团专区</title>
<link rel="stylesheet" href="../styles/tokens.css" />
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<svg style="display:none"><defs></defs></svg>
<div class="page ">
  <!-- 页面头部：后续转小程序时映射为 page-title-bar，保留返回按钮和右侧动作区 -->
  <div class="topbar">
    <button class="icon-btn" data-action="返回上一页"><svg class="icon"><use href="../assets/icons.svg#back"></use></svg></button>
    <div class="title">拼团专区</div>
    <div class="right"></div>
  </div>

  <div class="section">
    <div class="goods-row">
  <img class="goods-img" src="../assets/goods/rice.svg" alt="五常大米 2 人团" />
  <div>
    <div class="goods-title">五常大米 2 人团</div>
    <div class="goods-sub">还差 1 人成团 · 24 小时内发货</div>
    <div class="goods-meta"><span class="price">¥59.00</span><span>拼团价</span></div>
    <div class="btn-row" style="margin-top:10px"><button class="btn ghost" data-action="邀请好友">邀请好友</button><button class="btn primary" data-action="去拼团">去拼团</button></div>
  </div>
</div>
    <div class="goods-row">
  <img class="goods-img" src="../assets/goods/egg.svg" alt="散养土鸡蛋 3 人团" />
  <div>
    <div class="goods-title">散养土鸡蛋 3 人团</div>
    <div class="goods-sub">已拼 126 单 · 破损包赔</div>
    <div class="goods-meta"><span class="price">¥39.90</span><span>拼团价</span></div>
    <div class="btn-row" style="margin-top:10px"><button class="btn primary" data-action="开团">开团</button></div>
  </div>
</div>
  </div>

</div>
<script src="../scripts/prototype.js"></script>
</body>
</html>
