<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>商品列表</title>
<link rel="stylesheet" href="../styles/tokens.css" />
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<svg style="display:none"><defs></defs></svg>
<div class="page ">
  <!-- 页面头部：后续转小程序时映射为 page-title-bar，保留返回按钮和右侧动作区 -->
  <div class="topbar">
    <button class="icon-btn" data-action="返回上一页"><svg class="icon"><use href="../assets/icons.svg#back"></use></svg></button>
    <div class="title">商品列表</div>
    <div class="right"></div>
  </div>

  <div class="search-line"><div class="search-pill"><svg class="icon"><use href="../assets/icons.svg#search"></use></svg><input placeholder="搜索商品" /><button data-open-sheet="#filterSheet"><svg class="icon sm"><use href="../assets/icons.svg#filter"></use></svg></button></div></div><div class="chips"><div class="chip active">综合</div><div class="chip">销量</div><div class="chip">价格</div><div class="chip">有机</div></div><div class="section"><div class="goods-row">
  <img class="goods-img" src="../assets/goods/strawberry.svg" alt="丹东红颜草莓 2斤装" />
  <div>
    <div class="goods-title">丹东红颜草莓 2斤装</div>
    <div class="goods-sub">新鲜采摘 · 冷链配送</div>
    <div class="goods-meta"><span class="price">¥39.90</span><span></span></div>

  </div>
</div><div class="goods-row">
  <img class="goods-img" src="../assets/goods/rice.svg" alt="东北五常稻花香大米" />
  <div>
    <div class="goods-title">东北五常稻花香大米</div>
    <div class="goods-sub">产地直发 · 新米上市</div>
    <div class="goods-meta"><span class="price">¥69.00</span><span></span></div>

  </div>
</div></div><div id="filterSheet" class="sheet"><div class="sheet-panel"><div class="sheet-head"><div class="sheet-title">筛选商品</div><button data-close-sheet><svg class="icon"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="chips" style="padding:0"><div class="chip">现货</div><div class="chip">预售</div><div class="chip">产地直发</div><div class="chip">包邮</div></div><div class="bottom-bar" style="position:static;padding:12px 0 0"><button class="btn ghost" data-close-sheet>重置</button><button class="btn primary" data-close-sheet>确定</button></div></div></div>

</div>
<script src="../scripts/prototype.js"></script>
</body>
</html>
