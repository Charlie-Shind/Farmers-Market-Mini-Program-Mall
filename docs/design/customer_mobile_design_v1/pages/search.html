<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>搜索</title>
<link rel="stylesheet" href="../styles/tokens.css" />
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<svg style="display:none"><defs></defs></svg>
<div class="page ">
  <!-- 页面头部：后续转小程序时映射为 page-title-bar，保留返回按钮和右侧动作区 -->
  <div class="topbar">
    <button class="icon-btn" data-action="返回上一页"><svg class="icon"><use href="../assets/icons.svg#back"></use></svg></button>
    <div class="title">搜索</div>
    <div class="right"></div>
  </div>

  <div class="search-line" style="top:0"><div class="search-pill"><svg class="icon"><use href="../assets/icons.svg#search"></use></svg><input value="草莓" /><button class="btn primary" style="height:30px;min-height:30px" data-action="搜索">搜索</button></div></div><div class="section-head"><span class="section-title">搜索结果</span><span class="section-more">共 12 个</span></div><div class="section"><div class="goods-row">
  <img class="goods-img" src="../assets/goods/strawberry.svg" alt="丹东红颜草莓 2斤装" />
  <div>
    <div class="goods-title">丹东红颜草莓 2斤装</div>
    <div class="goods-sub">新鲜采摘 · 冷链配送</div>
    <div class="goods-meta"><span class="price">¥39.90</span><span></span></div>

  </div>
</div><div class="goods-row">
  <img class="goods-img" src="../assets/goods/gift.svg" alt="草莓礼盒装" />
  <div>
    <div class="goods-title">草莓礼盒装</div>
    <div class="goods-sub">送礼包装 · 可写祝福卡</div>
    <div class="goods-meta"><span class="price">¥68.00</span><span></span></div>

  </div>
</div></div>

</div>
<script src="../scripts/prototype.js"></script>
</body>
</html>
