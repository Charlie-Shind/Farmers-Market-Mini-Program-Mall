<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>店铺主页</title>
<link rel="stylesheet" href="../styles/tokens.css" />

<body>
<svg style="display:none"><defs></defs></svg>
<div class="page with-bottom">
  <!-- 页面头部：后续转小程序时映射为 page-title-bar，保留返回按钮和右侧动作区 -->
  <div class="topbar">
    <button class="icon-btn" data-action="返回上一页"><svg class="icon"><use href="../assets/icons.svg#back"></use></svg></button>
    <div class="title">店铺主页</div>
    <div class="right"></div>
  </div>

  <div class="profile-cover"><div class="row"><img class="avatar lg" src="../assets/avatars/user1.svg"><div><div class="profile-name">湾源生态农庄</div><div class="profile-sub">主营：时令果蔬 · 产地直发</div></div></div></div><div class="stats-row"><div class="stat"><div class="num">4.9</div><div class="lab">评分</div></div><div class="stat"><div class="num">1280</div><div class="lab">销量</div></div><div class="stat"><div class="num">36</div><div class="lab">商品</div></div></div><div class="section"><div class="goods-row">
  <img class="goods-img" src="../assets/goods/strawberry.svg" alt="丹东红颜草莓 2斤装" />

    <div class="goods-title">丹东红颜草莓 2斤装</div>

  </div>
</div><div class="goods-row">

    <div class="goods-title">赣南脐橙 5斤装</div>
    <div class="goods-sub">果园直发 · 包甜</div>

  </div>
</div></div><div class="bottom-bar"><button class="btn ghost" data-action="联系商家">联系商家</button><button class="btn primary" data-action="关注店铺">关注店铺</button></div>

</div>
<script src="../scripts/prototype.js"></script>
