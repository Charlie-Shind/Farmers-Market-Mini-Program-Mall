<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>联系商家</title>
<link rel="stylesheet" href="../styles/tokens.css" />
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<svg style="display:none"><defs></defs></svg>
<div class="page ">
  <!-- 页面头部：后续转小程序时映射为 page-title-bar，保留返回按钮和右侧动作区 -->
  <div class="topbar">
    <button class="icon-btn" data-action="返回上一页"><svg class="icon"><use href="../assets/icons.svg#back"></use></svg></button>
    <div class="title">联系商家</div>
    <div class="right"></div>
  </div>

  <div class="chat-page">
    <div class="section tight"><div class="cell"><div class="store-mini"><img class="avatar" src="../assets/avatars/user1.svg"><div><b>湾源生态农庄</b><div class="small muted">订单 WY202606180012</div></div></div><button class="btn ghost" data-action="查看订单">订单</button></div></div>
    <div id="messageArea" class="message-area">
      <div class="bubble-row"><img class="avatar" src="../assets/avatars/user1.svg"><div class="bubble">你好，草莓已经安排冷链发出，预计明天送达。</div></div>
      <div class="bubble-row mine"><div class="bubble">好的，麻烦帮我确认一下物流单号。</div></div>
      <div class="bubble-row"><img class="avatar" src="../assets/avatars/user1.svg"><div class="bubble">单号已经更新在订单里，也可以点击查看物流。</div></div>
    </div>
    <div class="chat-input"><button class="icon-btn" data-action="打开图片选择"><svg class="icon"><use href="../assets/icons.svg#camera"></use></svg></button><input id="chatInput" placeholder="输入消息" /><button class="btn primary" onclick="sendMsg()">发送</button></div>
  </div>

</div>
<script src="../scripts/prototype.js"></script>
</body>
</html>
