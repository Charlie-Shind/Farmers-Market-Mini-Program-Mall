<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>订单详情</title>
<link rel="stylesheet" href="../styles/tokens.css" />
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<svg style="display:none"><defs></defs></svg>
<div class="page with-bottom">
  <!-- 页面头部：后续转小程序时映射为 page-title-bar，保留返回按钮和右侧动作区 -->
  <div class="topbar">
    <button class="icon-btn" data-action="返回上一页"><svg class="icon"><use href="../assets/icons.svg#back"></use></svg></button>
    <div class="title">订单详情</div>
    <div class="right"></div>
  </div>

  <div class="notice"><b>待收货</b>　商品已发出，请留意物流更新。</div>
  <div class="section">
    <div class="cell"><div class="row" style="gap:8px"><svg class="icon"><use href="../assets/icons.svg#location"></use></svg><div><b>李同学　138****2846</b><div class="small muted">上海市浦东新区 张江路 88 号 3 栋 1202</div></div></div></div>
  </div>
  <div class="section">
    <div class="section-head"><span class="section-title">湾源生态农庄</span><button class="btn ghost" data-action="联系商家">联系商家</button></div>
    <div class="goods-row">
  <img class="goods-img" src="../assets/goods/strawberry.svg" alt="丹东红颜草莓 2斤装" />
  <div>
    <div class="goods-title">丹东红颜草莓 2斤装</div>
    <div class="goods-sub">规格：精品大果 · 冷链配送</div>
    <div class="goods-meta"><span class="price">¥39.90</span><span>x1</span></div>

  </div>
</div>
  </div>
  <div class="cell-list">
    <div class="cell"><span class="label">商品金额</span><span class="value">¥39.90</span></div>
    <div class="cell"><span class="label">运费</span><span class="value">¥6.00</span></div>
    <div class="cell"><span class="label">优惠</span><span class="value">-¥5.00</span></div>
    <div class="cell"><span class="label">实付款</span><span class="price">¥40.90</span></div>
  </div>
  <div class="cell-list">
    <div class="cell"><span class="label">订单编号</span><span class="value">WY202606180012</span></div>
    <div class="cell"><span class="label">下单时间</span><span class="value">2026-06-18 20:16</span></div>
    <div class="cell"><span class="label">支付方式</span><span class="value">微信支付</span></div>
  </div>
  <div class="bottom-bar"><button class="btn ghost" data-action="申请售后">申请售后</button><button class="btn ghost" data-action="查看物流">查看物流</button><button class="btn primary" data-action="确认收货">确认收货</button></div>

</div>
<script src="../scripts/prototype.js"></script>

</html>
