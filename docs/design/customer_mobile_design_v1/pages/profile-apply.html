<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>商家入驻</title>
<link rel="stylesheet" href="../styles/tokens.css" />
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<svg style="display:none"><defs></defs></svg>
<div class="page with-bottom">
  <!-- 页面头部：后续转小程序时映射为 page-title-bar，保留返回按钮和右侧动作区 -->
  <div class="topbar">
    <button class="icon-btn" data-action="返回上一页"><svg class="icon"><use href="../assets/icons.svg#back"></use></svg></button>
    <div class="title">商家入驻</div>
    <div class="right"></div>
  </div>

  <div class="notice">提交资料后，平台将在 1 到 3 个工作日内完成审核。</div>
  <form class="section"><div class="field"><label>店铺名称</label><input placeholder="请输入店铺名称" /></div><div class="field"><label>联系人</label><input placeholder="请输入联系人" /></div><div class="field"><label>联系电话</label><input placeholder="请输入手机号" /></div><div class="picker-cell"><span class="name">主营类目</span><span class="select">时令果蔬 <svg class="icon sm"><use href="../assets/icons.svg#chevron"></use></svg></span></div><div class="cell"><span class="label">营业执照</span><button class="btn ghost" data-action="上传图片">上传</button></div><div class="cell"><span class="label">产地资质</span><button class="btn ghost" data-action="上传图片">上传</button></div></form><div class="bottom-bar"><button class="btn primary" data-action="提交审核">提交审核</button></div>

</div>
<script src="../scripts/prototype.js"></script>
</body>
</html>
