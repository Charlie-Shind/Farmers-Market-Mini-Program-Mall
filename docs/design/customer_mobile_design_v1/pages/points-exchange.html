<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>积分兑换</title>
<link rel="stylesheet" href="../styles/tokens.css" />
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<svg style="display:none"><defs></defs></svg>
<div class="page ">
  <!-- 页面头部：后续转小程序时映射为 page-title-bar，保留返回按钮和右侧动作区 -->
  <div class="topbar">
    <button class="icon-btn" data-action="返回上一页"><svg class="icon"><use href="../assets/icons.svg#back"></use></svg></button>
    <div class="title">积分兑换</div>
    <div class="right"></div>
  </div>

  <div class="stats-row"><div class="stat"><div class="num">2680</div><div class="lab">当前积分</div></div><div class="stat"><div class="num">320</div><div class="lab">即将过期</div></div><div class="stat"><div class="num">6</div><div class="lab">可兑换</div></div></div>
  <div class="section">
    <div class="goods-row">
  <img class="goods-img" src="../assets/goods/gift.svg" alt="满 69 减 10 优惠券" />
  <div>
    <div class="goods-title">满 69 减 10 优惠券</div>
    <div class="goods-sub">需要 800 积分 · 全场通用</div>
    <div class="goods-meta"><span class="price">¥800积分</span><span></span></div>
    <div class="btn-row" style="margin-top:10px"><button class="btn primary" data-action="立即兑换">立即兑换</button></div>
  </div>
</div>
    <div class="goods-row">
  <img class="goods-img" src="../assets/goods/tea.svg" alt="春茶尝鲜券" />
  <div>
    <div class="goods-title">春茶尝鲜券</div>
    <div class="goods-sub">需要 1200 积分 · 茶叶专区</div>
    <div class="goods-meta"><span class="price">¥1200积分</span><span></span></div>
    <div class="btn-row" style="margin-top:10px"><button class="btn primary" data-action="立即兑换">立即兑换</button></div>
  </div>
</div>
  </div>

</div>
<script src="../scripts/prototype.js"></script>
