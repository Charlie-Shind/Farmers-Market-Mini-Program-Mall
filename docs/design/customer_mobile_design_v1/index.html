<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>C端移动设计稿</title><link rel="stylesheet" href="styles/tokens.css"><style>body{background:#F6F3EB}.wrap{min-height:100vh;display:grid;grid-template-columns:310px 1fr;gap:20px;padding:20px}.nav{background:#fff;border:1px solid rgba(44,74,57,.1);border-radius:22px;padding:16px;max-height:calc(100vh - 40px);overflow:auto}.nav h1{font-size:22px;margin:0 0 6px}.nav p{color:#8A877F;line-height:1.6;font-size:13px;margin:0 0 12px}.nav button{width:100%;border:0;background:#FAFAF7;border-radius:14px;padding:10px 12px;margin:5px 0;text-align:left;display:flex;justify-content:flex-start;gap:10px;cursor:pointer}.nav button.active{background:#2C4A39;color:#fff}.nav small{opacity:.55}.phone{width:390px;height:844px;margin:auto;background:#fff;border-radius:36px;padding:10px;box-shadow:0 24px 80px rgba(44,74,57,.18)}iframe{width:100%;height:100%;border:0;border-radius:28px;background:#FAFAF7}@media(max-width:760px){.wrap{display:block;padding:0}.nav{border-radius:0;max-height:none}.phone{width:100%;height:100vh;border-radius:0;padding:0;box-shadow:none}iframe{border-radius:0}}</style></head><body><div class="wrap"><aside class="nav"><h1>C端二级页设计稿</h1><p>不包含底部导航五个页面，也不包含商品详情页。当前稿只统一其它页面的移动端视觉和交互。</p><button data-page="pages/search.html"><span>搜索结果</span></button>
