<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>买家会话</title><link rel="stylesheet" href="../styles/components.css" /></head><body>
<main class="app-page no-bottom chat-page"><div class="status-space"></div>
<header class="page-titlebar"><a class="back-btn" href="messages.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">李女士</div><div class="page-subtitle">订单 WY20260618001 · 待发货</div></div><button class="icon-action" data-open-sheet="contactSheet"><svg class="icon"><use href="../assets/icons.svg#message"></use></svg><span>联系</span></button></header>
<section class="demo-card-list"><a class="demo-card" href="order-detail.html"><img src="../assets/goods/g2.svg" alt="商品"/><div><div class="demo-title">高山蓝莓礼盒 4盒装</div><div class="demo-desc">待发货 · ¥268.00 · 顺丰冷链</div></div><div class="demo-right">订单</div></a></section>
<section class="chat-flow"><div class="message-bubble">您好，蓝莓今天能发货吗？我周末想送礼。</div><div class="message-bubble me">可以的，今天 18:00 前会录入顺丰冷链单号。</div><div class="message-bubble">好的，麻烦帮我备注一下不要挤压。</div><div class="message-bubble me">已备注，包装会加固处理。</div></section>
<div class="chat-input-bar"><button class="round-tool" data-open-sheet="quickReply"><svg class="icon-sm"><use href="../assets/icons.svg#plus"></use></svg></button><input placeholder="输入回复内容"/><button class="pill-btn primary" data-toast="已发送消息">发送</button></div>
<div class="sheet-mask" data-sheet-mask></div><section class="sheet" id="contactSheet"><div class="sheet-head"><div class="sheet-title">联系买家</div><button class="icon-btn" data-close-sheet><svg class="icon"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><a class="contact-sheet-row" href="tel:13800000000"><div><strong>电话联系</strong><span>138****8821</span></div><svg class="icon-sm"><use href="../assets/icons.svg#chevron"></use></svg></a><button class="contact-sheet-row" data-toast="已复制微信号"><div><strong>复制微信号</strong><span>wanyuan_farm</span></div><svg class="icon-sm"><use href="../assets/icons.svg#chevron"></use></svg></button><a class="contact-sheet-row" href="order-detail.html"><div><strong>查看订单</strong><span>订单、地址、物流</span></div><svg class="icon-sm"><use href="../assets/icons.svg#chevron"></use></svg></a></div></section>
<section class="sheet" id="quickReply"><div class="sheet-head"><div class="sheet-title">快捷回复</div><button class="icon-btn" data-close-sheet><svg class="icon"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><div class="option-grid"><button class="option" data-toast="已插入：今天发货">今天发货</button><button class="option" data-toast="已插入：已备注">已备注</button><button class="option" data-toast="已插入：物流稍后更新">物流稍后更新</button><button class="option" data-toast="已插入：包装已加固">包装已加固</button></div></div></section>
</main><script src="../scripts/prototype.js"></script></body></html>
