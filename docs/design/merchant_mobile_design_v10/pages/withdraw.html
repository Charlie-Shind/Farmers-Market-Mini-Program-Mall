<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>提现申请</title>
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<main class="app-page no-bottom with-sticky">
<div class="status-space"></div>
<header class="page-titlebar">
  <a class="back-btn" href="javascript:history.back()"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">提现</div><div class="page-subtitle">预计 1 到 3 个工作日到账</div></div>
</header>
<section class="metric-strip"><div class="metric-item" style="grid-column: span 3"><div class="metric-value">¥8,920.00</div><div class="metric-label">当前可提现金额</div></div></section>
<div class="form-section"><div class="form-section-title">提现金额</div><div class="toolbar" style="padding:0;border:0"><button class="chip active">全部提现</button><button class="chip">¥500</button><button class="chip">¥1000</button><button class="chip">自定义</button></div><div class="field"><div class="field-label"><span>自定义金额</span><span>单位：元</span></div><input value="8920.00" /></div></div>
<div class="form-section"><div class="form-section-title">到账账户</div><button class="setting-row" style="padding-left:0;padding-right:0;width:100%" data-open-sheet="accountSheet"><div class="row-main"><div class="row-title">微信商家零钱</div><div class="row-desc">已绑定，尾号 8912</div></div><span class="row-right">切换<svg class="icon-sm" aria-hidden="true"><use href="../assets/icons.svg#chevron"></use></svg></span></button></div>
<div class="divider"></div><div class="section-line-title">提现记录</div><section class="full-list"><div class="finance-row"><div><div class="row-title">2026-06-16</div><div class="row-desc">已到账</div></div><strong>¥2,000.00</strong></div><div class="finance-row"><div><div class="row-title">2026-06-10</div><div class="row-desc">已到账</div></div><strong>¥1,500.00</strong></div></section><div class="bottom-actions"><button class="action-btn" data-toast="已提交提现申请">提交提现申请</button></div>
<div class="sheet-mask" data-sheet-mask></div><section class="sheet" id="accountSheet"><div class="sheet-head"><div class="sheet-title">选择到账账户</div><button class="icon-btn" data-close-sheet><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><div class="sheet-label">账户</div><div class="option-grid"><button class="option active">微信商家零钱</button><button class="option ">对公银行卡</button><button class="option ">微信零钱</button></div></div><div class="bottom-actions" style="position:static;transform:none;padding:0;border-top:0"><button class="action-btn secondary" data-toast="已重置筛选">重置</button><button class="action-btn" data-toast="已应用筛选" data-close-sheet>应用筛选</button></div></section>

</main>
<script src="../scripts/prototype.js"></script>
</body>
</html>
