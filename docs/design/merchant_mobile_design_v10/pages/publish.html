<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>发布商品</title><link rel="stylesheet" href="../styles/components.css" /></head>
<body>
<main class="app-page no-bottom with-sticky">

<div class="status-space"></div>
<header class="page-titlebar"><a class="back-btn" href="products.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">发布商品</div></div></header>
<div class="section-line-title"><span>商品图片</span><a class="row-right" href="publish-images.html">管理图片<svg class="icon-sm"><use href="../assets/icons.svg#chevron"></use></svg></a></div>
<section class="photo-strip"><div class="photo-thumb"><img src="../assets/goods/g2.svg"/><span class="mini-label">主图</span></div><div class="photo-thumb"><img src="../assets/goods/g11.svg"/></div><div class="photo-thumb"><img src="../assets/goods/g13.svg"/></div><a class="photo-add" href="publish-images.html"><svg class="icon"><use href="../assets/icons.svg#camera"></use></svg></a></section>
<div class="section-line-title"><span>商品视频</span><span class="row-right">可选</span></div><section class="media-upload-row"><div class="video-thumb"></div><div class="media-main"><div class="media-title">上传商品视频</div><div class="media-meta">支持产地、开箱、商品细节展示</div></div><button class="pill-btn primary" data-toast="已选择视频文件">上传</button></section>
<section class="full-list"><a class="notice-row" href="publish-category.html"><div class="row-main"><div class="row-title">商品分类</div><div class="row-desc">时令果蔬 / 蓝莓鲜果</div></div><div class="row-right">修改<svg class="icon-sm"><use href="../assets/icons.svg#chevron"></use></svg></div></a><div class="form-line"><label>商品标题<span>必填</span></label><input value="高山蓝莓礼盒 4盒装" /></div><div class="form-line"><label>副标题<span>卖点</span></label><input value="产地直发，当日采摘，顺丰冷链" /></div><div class="form-line"><label>商品详情<span>图文详情</span></label><textarea>适合家庭分享与企业礼赠，果径均匀，酸甜适中。</textarea></div></section>
<div class="section-line-title"><span>价格库存</span><a class="row-right" href="publish-sku.html">规格库存<svg class="icon-sm"><use href="../assets/icons.svg#chevron"></use></svg></a></div><section class="data-grid-3"><div class="data-cell"><strong>¥298</strong><span>销售价</span></div><div class="data-cell"><strong>168</strong><span>库存</span></div><div class="data-cell"><strong>1.5kg</strong><span>重量</span></div></section>
<div class="section-line-title"><span>规格模式</span></div><section class="segment"><button class="active" data-toast="已选择多规格">多规格</button><button data-toast="已切换单规格">单规格</button><a href="publish-sku.html">编辑规格</a></section>
<div class="section-line-title"><span>服务标签多选</span></div><section class="panel-line"><div class="multi-chip-row"><button class="multi-chip active" data-multi-chip>产地直发</button><button class="multi-chip active" data-multi-chip>顺丰冷链</button><button class="multi-chip" data-multi-chip>坏果包赔</button><button class="multi-chip" data-multi-chip>有机认证</button><button class="multi-chip active" data-multi-chip>48小时发货</button></div></section>
<div class="section-line-title"><span>更多设置</span></div><section class="full-list"><div class="switch-row"><span class="switch-main"><strong>开启预售</strong><span>设置发货周期和预售库存</span></span><button class="fake-switch" data-switch></button></div><div class="switch-row"><span class="switch-main"><strong>启用溯源码</strong><span>展示产地、采摘、质检信息</span></span><button class="fake-switch active" data-switch></button></div><div class="switch-row"><span class="switch-main"><strong>商品视频</strong><span>上传 15 秒产地介绍视频</span></span><button class="fake-switch" data-switch></button></div></section>
<div class="bottom-actions three"><button class="action-btn secondary" data-toast="已保存商品草稿">存草稿</button><a class="action-btn secondary" href="product-drafts.html">草稿箱</a><button class="action-btn" data-toast="已提交上架审核">提交上架</button></div>


</main>
<script src="../scripts/prototype.js"></script>
</body></html>
