<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>库存调整</title><link rel="stylesheet" href="../styles/components.css" /></head><body>
<main class="app-page no-bottom"><div class="status-space"></div>
<header class="page-titlebar"><a class="back-btn" href="javascript:history.back()"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">库存调整</div></div><button class="icon-action" data-open-sheet="stockFilter"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#filter"></use></svg><span>筛选</span></button></header>
<div class="toolbar" data-chip-group="chips"><button class="chip active" data-chip="all">全部</button><button class="chip" data-chip="low">低库存</button><button class="chip" data-chip="zero">无库存</button><button class="chip" data-chip="normal">正常</button></div>
<section class="full-list" data-filter-list>
<div class="product-list-item" data-status="normal" data-search="蓝莓礼盒 顺丰冷链装 42"><img class="goods-img" src="../assets/goods/g2.svg" alt="商品图片" /><div class="product-list-body"><div class="product-list-head"><div class="product-list-title">蓝莓礼盒 顺丰冷链装</div><span class="status-pill success">库存 42</span></div><div class="product-list-meta">现货商品 · 冷链配送</div><div class="product-list-bottom"><span class="row-right">已上架</span><div class="btn-row"><button class="pill-btn" data-toast="减少库存">减少</button><button class="pill-btn primary" data-toast="增加库存">增加</button></div></div></div></div>
<div class="product-list-item" data-status="low" data-search="高山土鸡蛋 30枚装 6"><img class="goods-img" src="../assets/goods/g3.svg" alt="商品图片" /><div class="product-list-body"><div class="product-list-head"><div class="product-list-title">高山土鸡蛋 30枚装</div><span class="status-pill warning">库存 6</span></div><div class="product-list-meta">现货商品 · 库存预警</div><div class="product-list-bottom"><span class="row-right">已上架</span><div class="btn-row"><button class="pill-btn" data-toast="减少库存">减少</button><button class="pill-btn primary" data-toast="增加库存">增加</button></div></div></div></div>
<div class="product-list-item" data-status="zero" data-search="山货干货礼盒 0"><img class="goods-img" src="../assets/goods/g6.svg" alt="商品图片" /><div class="product-list-body"><div class="product-list-head"><div class="product-list-title">山货干货礼盒</div><span class="status-pill danger">库存 0</span></div><div class="product-list-meta">自动下架 · 需补库存</div><div class="product-list-bottom"><span class="row-right">已下架</span><div class="btn-row"><button class="pill-btn" data-toast="减少库存">减少</button><button class="pill-btn primary" data-toast="增加库存">增加</button></div></div></div></div>
<div class="list-empty">没有匹配商品</div></section>
<div class="sheet-mask" data-sheet-mask></div><section class="sheet" id="stockFilter"><div class="sheet-head"><div class="sheet-title">库存筛选</div><button class="icon-btn" data-close-sheet><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><div class="sheet-label">库存情况</div><div class="option-grid"><button class="option active">全部</button><button class="option">低库存</button><button class="option">无库存</button><button class="option">正常</button></div></div><div class="sheet-group"><div class="sheet-label">商品分类</div><div class="option-grid"><button class="option active">全部</button><button class="option">时令果蔬</button><button class="option">特产礼盒</button><button class="option">粮油干货</button></div></div><div class="bottom-actions" style="position:static;transform:none;padding:0;border-top:0"><button class="action-btn secondary" data-toast="已重置筛选">重置</button><button class="action-btn" data-toast="已应用筛选" data-close-sheet>应用筛选</button></div></section>
</main><script src="../scripts/prototype.js"></script></body></html>
