<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>配送设置</title><link rel="stylesheet" href="../styles/components.css" /></head><body>
<main class="app-page no-bottom with-sticky"><div class="status-space"></div>
<header class="page-titlebar"><a class="back-btn" href="javascript:history.back()"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">配送设置</div></div><button class="icon-action" data-toast="已保存配送设置"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#check"></use></svg><span>保存</span></button></header>
<div class="section-line-title"><span>发货地址</span><button class="row-right" data-open-sheet="addressSheet">编辑<svg class="icon-sm"><use href="../assets/icons.svg#chevron"></use></svg></button></div>
<section class="delivery-card"><div class="delivery-row"><span class="delivery-icon"><svg class="icon-sm"><use href="../assets/icons.svg#store"></use></svg></span><div><div class="delivery-title">湾源农仓发货仓</div><div class="delivery-desc">云南省楚雄州双柏县产业园 3 号仓</div></div><span class="status-pill success">默认</span></div></section>
<div class="section-line-title"><span>运费模板</span></div>
<section class="delivery-card"><button class="delivery-row" data-open-sheet="deliverySheet"><span class="delivery-icon"><svg class="icon-sm"><use href="../assets/icons.svg#bill"></use></svg></span><div><div class="delivery-title">满额包邮</div><div class="delivery-desc">满 99 元包邮，未满收 8 元</div></div><span class="row-right">编辑<svg class="icon-sm"><use href="../assets/icons.svg#chevron"></use></svg></span></button><button class="delivery-row" data-open-sheet="areaSheet"><span class="delivery-icon"><svg class="icon-sm"><use href="../assets/icons.svg#truck"></use></svg></span><div><div class="delivery-title">配送范围</div><div class="delivery-desc">全国配送，冷链限制部分地区</div></div><span class="row-right">设置<svg class="icon-sm"><use href="../assets/icons.svg#chevron"></use></svg></span></button><div class="delivery-row"><span class="delivery-icon"><svg class="icon-sm"><use href="../assets/icons.svg#shield"></use></svg></span><div><div class="delivery-title">冷链提示</div><div class="delivery-desc">生鲜商品详情展示冷链说明</div></div><button class="fake-switch active" data-switch></button></div></section>
<div class="section-line-title"><span>快递偏好</span></div>
<section class="delivery-card"><div class="delivery-row"><span class="delivery-icon"><svg class="icon-sm"><use href="../assets/icons.svg#truck"></use></svg></span><div><div class="delivery-title">优先快递</div><div class="delivery-desc">顺丰速运 / 京东物流</div></div><button class="pill-btn outline" data-open-sheet="expressSheet">选择</button></div><div class="delivery-row"><span class="delivery-icon"><svg class="icon-sm"><use href="../assets/icons.svg#bell"></use></svg></span><div><div class="delivery-title">发货提醒</div><div class="delivery-desc">订单付款后 2 小时提醒</div></div><button class="fake-switch active" data-switch></button></div></section>
<div class="bottom-actions"><button class="action-btn secondary" data-toast="已恢复默认设置">恢复默认</button><button class="action-btn" data-toast="已保存配送设置">保存设置</button></div>
<div class="sheet-mask" data-sheet-mask></div>
<section class="sheet" id="addressSheet"><div class="sheet-head"><div class="sheet-title">发货地址</div><button class="icon-btn" data-close-sheet><svg class="icon"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><div class="inline-field"><label>联系人</label><input value="王师傅"></div></div><div class="sheet-group"><div class="inline-field"><label>联系电话</label><input value="138****8821"></div></div><div class="sheet-group"><div class="inline-field"><label>详细地址</label><input value="云南省楚雄州双柏县产业园 3 号仓"></div></div><div class="bottom-actions" style="position:static;transform:none;padding:0;border-top:0"><button class="action-btn secondary" data-close-sheet>取消</button><button class="action-btn" data-toast="已保存地址" data-close-sheet>保存</button></div></section>
<section class="sheet" id="deliverySheet"><div class="sheet-head"><div class="sheet-title">运费模板</div><button class="icon-btn" data-close-sheet><svg class="icon"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><div class="sheet-label">模板类型</div><div class="option-grid"><button class="option active">满额包邮</button><button class="option">固定运费</button><button class="option">按地区收费</button></div></div><div class="sheet-group"><div class="form-two"><div class="inline-field"><label>包邮门槛</label><input value="99"></div><div class="inline-field"><label>基础运费</label><input value="8"></div></div></div><div class="bottom-actions" style="position:static;transform:none;padding:0;border-top:0"><button class="action-btn secondary" data-close-sheet>取消</button><button class="action-btn" data-toast="已保存运费模板" data-close-sheet>保存</button></div></section>
<section class="sheet" id="areaSheet"><div class="sheet-head"><div class="sheet-title">配送范围</div><button class="icon-btn" data-close-sheet><svg class="icon"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><div class="sheet-label">范围</div><div class="option-grid"><button class="option active">全国</button><button class="option">省内</button><button class="option">同城</button><button class="option">自定义</button></div></div><div class="sheet-group"><div class="sheet-label">限制地区</div><div class="multi-chip-row"><button class="multi-chip active" data-multi-chip>冷链不可达</button><button class="multi-chip" data-multi-chip>偏远地区</button><button class="multi-chip" data-multi-chip>港澳台</button></div></div><div class="bottom-actions" style="position:static;transform:none;padding:0;border-top:0"><button class="action-btn secondary" data-close-sheet>取消</button><button class="action-btn" data-toast="已保存配送范围" data-close-sheet>保存</button></div></section>
<section class="sheet" id="expressSheet"><div class="sheet-head"><div class="sheet-title">快递偏好</div><button class="icon-btn" data-close-sheet><svg class="icon"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><div class="option-grid"><button class="option active">顺丰速运</button><button class="option active">京东物流</button><button class="option">中通快递</button><button class="option">圆通速递</button></div></div><div class="bottom-actions" style="position:static;transform:none;padding:0;border-top:0"><button class="action-btn secondary" data-close-sheet>取消</button><button class="action-btn" data-toast="已保存快递偏好" data-close-sheet>保存</button></div></section>
</main><script src="../scripts/prototype.js"></script></body></html>
