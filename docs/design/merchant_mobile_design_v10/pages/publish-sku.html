<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>规格库存</title><link rel="stylesheet" href="../styles/components.css" /></head>
<body>
<main class="app-page no-bottom with-sticky">
<div class="status-space"></div>
<header class="page-titlebar"><a class="back-btn" href="publish.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">规格库存</div></div></header>
<div class="section-line-title"><span>规格模式</span></div><section class="segment"><button class="active" data-toast="多规格已启用">多规格</button><button data-toast="单规格已启用">单规格</button><button data-toast="已批量填充库存">批量填充</button></section>
<section class="spec-editor"><div class="spec-block"><div class="spec-block-head"><div class="spec-block-title">规格组：包装</div><div class="btn-row"><button class="pill-btn outline" data-toast="新增包装选项">新增</button><button class="pill-btn danger" data-toast="已删除包装规格组">删除组</button></div></div><div class="spec-option-wrap"><button class="spec-option active" data-multi-chip>2盒装<span class="mini-x" data-delete-parent=".spec-option">×</span></button><button class="spec-option active" data-multi-chip>4盒装<span class="mini-x" data-delete-parent=".spec-option">×</span></button><button class="spec-option" data-multi-chip>8盒装<span class="mini-x" data-delete-parent=".spec-option">×</span></button></div></div><div class="spec-block"><div class="spec-block-head"><div class="spec-block-title">规格组：等级</div><div class="btn-row"><button class="pill-btn outline" data-toast="新增等级选项">新增</button><button class="pill-btn danger" data-toast="已删除等级规格组">删除组</button></div></div><div class="spec-option-wrap"><button class="spec-option active" data-multi-chip>精选<span class="mini-x" data-delete-parent=".spec-option">×</span></button><button class="spec-option active" data-multi-chip>特级<span class="mini-x" data-delete-parent=".spec-option">×</span></button></div></div></section>
<div class="section-line-title"><span>规格组合</span><button class="row-right" data-toast="已批量同步价格">同步价格</button></div>
<section class="panel-line"><article class="sku-card"><div class="sku-head"><div class="sku-title-row"><div class="sku-name">2盒装 / 精选</div><div class="product-sub">编码：BB-2-JX</div></div><div class="sku-tools"><button class="pill-btn outline" data-toast="已停用该规格">停用</button><button class="pill-btn danger" data-delete-parent=".sku-card">删除</button></div></div><div class="sku-grid"><div class="sku-field"><label>价格</label><input value="158" /></div><div class="sku-field"><label>库存</label><input value="86" /></div><div class="sku-field"><label>活动价</label><input value="128" /></div><div class="sku-field"><label>限购</label><input value="2" /></div></div></article><article class="sku-card"><div class="sku-head"><div class="sku-title-row"><div class="sku-name">4盒装 / 特级</div><div class="product-sub">编码：BB-4-TJ</div></div><div class="sku-tools"><button class="pill-btn outline" data-toast="已停用该规格">停用</button><button class="pill-btn danger" data-delete-parent=".sku-card">删除</button></div></div><div class="sku-grid"><div class="sku-field"><label>价格</label><input value="298" /></div><div class="sku-field"><label>库存</label><input value="168" /></div><div class="sku-field"><label>活动价</label><input value="238" /></div><div class="sku-field"><label>限购</label><input value="2" /></div></div></article><article class="sku-card"><div class="sku-head"><div class="sku-title-row"><div class="sku-name">8盒装 / 特级</div><div class="product-sub">编码：BB-8-TJ</div></div><div class="sku-tools"><button class="pill-btn outline" data-toast="已停用该规格">停用</button><button class="pill-btn danger" data-delete-parent=".sku-card">删除</button></div></div><div class="sku-grid"><div class="sku-field"><label>价格</label><input value="568" /></div><div class="sku-field"><label>库存</label><input value="12" /></div><div class="sku-field"><label>活动价</label><input value="498" /></div><div class="sku-field"><label>限购</label><input value="1" /></div></div></article></section>
<div class="bottom-actions"><button class="action-btn secondary" data-toast="已保存规格草稿">保存草稿</button><a class="action-btn" href="publish.html">保存并返回</a></div>
</main>
<script src="../scripts/prototype.js"></script>
</body></html>
