<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>商品图片</title><link rel="stylesheet" href="../styles/components.css" /></head>
<body>
<main class="app-page no-bottom with-sticky">

<div class="status-space"></div>
<header class="page-titlebar"><a class="back-btn" href="publish.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">商品图片</div><div class="page-subtitle">主图、详情图、产地图，统一用于商品发布</div></div></header>
<section class="photo-strip"><div class="photo-thumb"><img src="../assets/goods/g2.svg"/><span class="mini-label">主图</span></div><div class="photo-thumb"><img src="../assets/goods/g11.svg"/></div><div class="photo-thumb"><img src="../assets/goods/g13.svg"/></div><div class="photo-thumb"><img src="../assets/goods/g14.svg"/></div><button class="photo-add" data-toast="选择图片"><svg class="icon"><use href="../assets/icons.svg#camera"></use></svg></button></section><div class="section-line-title"><span>图片要求</span></div><section class="process-list"><div class="process-row done"><span class="process-index">1</span><span class="process-main"><strong>主图清晰</strong><span>建议 1:1 正方形，主体居中，避免文字过多</span></span><span class="status-pill success">已符合</span></div><div class="process-row"><span class="process-index">2</span><span class="process-main"><strong>详情图补充</strong><span>可展示产地、包装、规格、质检信息</span></span><span class="status-pill info">建议</span></div></section><div class="bottom-actions"><button class="action-btn secondary" data-toast="已设为主图">设为主图</button><a class="action-btn" href="publish.html">保存图片</a></div>


</main>
<script src="../scripts/prototype.js"></script>
</body></html>
