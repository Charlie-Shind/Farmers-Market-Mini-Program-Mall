<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>商品编辑</title><link rel="stylesheet" href="../styles/components.css" /></head><body>
<main class="app-page no-bottom with-sticky"><div class="status-space"></div>
<header class="page-titlebar"><a class="back-btn" href="products.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">编辑商品</div></div><a class="icon-action" href="product-drafts.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#clock"></use></svg><span>草稿</span></a></header>
<div class="segment"><a class="active" href="#basic">基础</a><a href="publish-images.html">图片</a><a href="publish-sku.html">规格</a><a href="#extra">更多</a></div>
<div class="section-line-title"><span>商品图片</span><span class="row-right">最多 9 张</span></div>
<div class="photo-grid"><div class="photo-box"><img src="../assets/goods/g2.svg" alt="主图" /><span class="tag">主图</span></div><div class="photo-box"><img src="../assets/goods/g3.svg" alt="商品图" /></div><button class="photo-box" data-toast="添加图片"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#camera"></use></svg></button><button class="photo-box" data-toast="继续添加图片"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#plus"></use></svg></button></div>
<div class="section-line-title"><span>商品视频</span><span class="row-right">可选</span></div>
<section class="media-upload-row"><div class="video-thumb"></div><div class="media-main"><div class="media-title">产地介绍视频</div><div class="media-meta">已上传 12 秒，可重新上传或删除</div></div><div class="btn-row"><button class="pill-btn outline" data-toast="重新上传视频">重传</button><button class="pill-btn danger" data-toast="已删除视频">删除</button></div></section>
<div class="section-line-title" id="basic"><span>商品信息</span></div><div class="form-line"><label><span>商品分类</span><span>可重选</span></label><input value="时令果蔬 / 新鲜水果" /></div><div class="form-line"><label><span>商品标题</span><span>必填</span></label><input value="湾源农仓 蓝莓礼盒 顺丰冷链装" /></div><div class="form-line"><label><span>商品副标题</span><span>选填</span></label><input value="产地直发，坏果包赔" /></div>
<div class="section-line-title"><span>价格与库存</span><a class="row-right" href="publish-sku.html">管理规格<svg class="icon-sm" aria-hidden="true"><use href="../assets/icons.svg#chevron"></use></svg></a></div><div class="form-line"><label><span>销售价</span><span>必填</span></label><input value="268.00" /></div><div class="form-line"><label><span>划线价</span><span>选填</span></label><input value="318.00" /></div><div class="form-line"><label><span>总库存</span><span>自动汇总</span></label><input value="42" /></div>
<div class="section-line-title"><span>规格设置</span><a class="pill-btn" href="publish-sku.html">进入规格库存</a></div><section class="spec-editor"><div class="spec-block"><div class="spec-block-head"><div class="spec-block-title">当前模式</div><span class="status-pill success">多规格</span></div><div class="spec-option-wrap"><span class="spec-option active">重量</span><span class="spec-option active">包装</span><span class="spec-option active">配送</span></div></div></section>
<div class="section-line-title" id="extra"><span>服务标签</span><span class="row-right">可多选</span></div><div class="form-line"><div class="multi-chip-row"><button class="multi-chip active" data-multi-chip>坏果包赔</button><button class="multi-chip active" data-multi-chip>冷链直发</button><button class="multi-chip active" data-multi-chip>产地直发</button><button class="multi-chip" data-multi-chip>现货速发</button></div></div>
<div class="section-line-title"><span>商品详情</span></div><div class="form-line"><label><span>详情描述</span><span>买家可见</span></label><textarea>蓝莓礼盒产地直发，果径均匀，适合家庭自食与节礼赠送。</textarea></div>
<div class="section-line-title"><span>更多信息</span><span class="row-right">已填 4 项</span></div><div class="form-line"><label><span>产地</span><span>必填</span></label><input value="云南·楚雄" /></div><div class="form-line"><label><span>溯源码</span><span>选填</span></label><input value="TRACE-YN-20260618" /></div><div class="form-line"><label><span>溯源说明</span><span>买家可见</span></label><textarea>本商品全程冷链配送，支持农药残留抽检合格验证。</textarea></div><div class="form-line"><label><span>预售模式</span><span>可切换</span></label><div class="multi-chip-row"><button class="multi-chip active" data-multi-chip>现货</button><button class="multi-chip" data-multi-chip>开启预售</button></div></div>
<div class="bottom-actions three"><a class="action-btn secondary" href="product-drafts.html">草稿箱</a><button class="action-btn secondary" data-toast="已保存草稿">保存草稿</button><button class="action-btn" data-toast="已提交上架">保存并上架</button></div>
</main><script src="../scripts/prototype.js"></script></body></html>
