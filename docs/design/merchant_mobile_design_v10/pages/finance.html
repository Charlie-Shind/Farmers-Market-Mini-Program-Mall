<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>财务管理</title>
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<main class="app-page">
<div class="status-space"></div>
<header class="page-titlebar">
  <a class="back-btn" href="javascript:history.back()"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">财务</div><div class="page-subtitle">可提现与资金流水</div></div><a class="icon-action" href="withdraw.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#wallet"></use></svg><span>提现</span></a>
</header>
<section class="metric-strip"><div class="metric-item"><div class="metric-value">¥8,920</div><div class="metric-label">可提现</div></div><div class="metric-item"><div class="metric-value">¥1,260</div><div class="metric-label">冻结中</div></div><div class="metric-item"><div class="metric-value">¥3,280</div><div class="metric-label">本周收入</div></div></section>
<section class="entry-grid"><a class="entry-item" href="withdraw.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#wallet"></use></svg><span>申请提现</span></a><a class="entry-item" href="statistics.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#chart"></use></svg><span>数据统计</span></a><button class="entry-item" data-open-sheet="financeFilter"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#filter"></use></svg><span>筛选流水</span></button><button class="entry-item" data-toast="导出账单"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#bill"></use></svg><span>导出账单</span></button></section>
<div class="toolbar" data-chip-group="chips"><button class="chip active" data-chip="all">全部</button><button class="chip " data-chip="income">收入</button><button class="chip " data-chip="withdraw">提现</button><button class="chip " data-chip="refund">退款</button></div><section class="full-list" data-filter-list><div class="finance-row" data-status="income" data-search="订单入账 WY20260618001 +¥268.00"><div class="row-main"><div class="row-title">订单入账</div><div class="row-desc">WY20260618001</div></div><strong class="status-text success">+¥268.00</strong></div><div class="finance-row" data-status="withdraw" data-search="提现申请 处理中 -¥1,000.00"><div class="row-main"><div class="row-title">提现申请</div><div class="row-desc">处理中</div></div><strong class="status-text ">-¥1,000.00</strong></div><div class="finance-row" data-status="refund" data-search="退款扣减 WY20260616012 -¥76.00"><div class="row-main"><div class="row-title">退款扣减</div><div class="row-desc">WY20260616012</div></div><strong class="status-text danger">-¥76.00</strong></div><div class="finance-row" data-status="income" data-search="订单入账 WY20260615008 +¥128.00"><div class="row-main"><div class="row-title">订单入账</div><div class="row-desc">WY20260615008</div></div><strong class="status-text success">+¥128.00</strong></div><div class="list-empty">没有匹配流水</div></section><div class="sheet-mask" data-sheet-mask></div><section class="sheet" id="financeFilter"><div class="sheet-head"><div class="sheet-title">流水筛选</div><button class="icon-btn" data-close-sheet><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><div class="sheet-label">交易类型</div><div class="option-grid"><button class="option active">全部</button><button class="option ">收入</button><button class="option ">提现</button><button class="option ">退款</button><button class="option ">服务费</button></div></div><div class="sheet-group"><div class="sheet-label">时间</div><div class="option-grid"><button class="option active">今天</button><button class="option ">近7天</button><button class="option ">近30天</button><button class="option ">自定义</button></div></div><div class="sheet-group"><div class="sheet-label">金额</div><div class="option-grid"><button class="option active">全部</button><button class="option ">100元以下</button><button class="option ">100到500元</button><button class="option ">500元以上</button></div></div><div class="bottom-actions" style="position:static;transform:none;padding:0;border-top:0"><button class="action-btn secondary" data-toast="已重置筛选">重置</button><button class="action-btn" data-toast="已应用筛选" data-close-sheet>应用筛选</button></div></section>
<nav class="bottom-nav" aria-label="商家端底部导航"><a class="" href="dashboard.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#home"></use></svg><span>首页</span></a><a class="" href="messages.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#message"></use></svg><span>聊天</span></a><a class="" href="orders.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#order"></use></svg><span>订单</span></a><a class="" href="products.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#box"></use></svg><span>库存</span></a><a class="active" href="shop.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#user"></use></svg><span>账号</span></a></nav>
</main>
<script src="../scripts/prototype.js"></script>
</body>
</html>
