<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>订单详情</title>
<link rel="stylesheet" href="../styles/components.css" />
</head>
<body>
<main class="app-page no-bottom with-sticky">
<div class="status-space"></div>
<header class="page-titlebar">
  <a class="back-btn" href="javascript:history.back()"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">订单详情</div><div class="page-subtitle">WY20260618001</div></div><span class="status-pill warning">待发货</span>
</header>
<section class="full-list">
  <div class="notice-row"><div class="row-main"><div class="row-title">买家已付款，等待商家发货</div><div class="row-desc">请在 24 小时内录入物流信息</div></div><button class="pill-btn primary" data-open-sheet="shipSheet">去发货</button></div>
</section><div class="divider"></div>
<div class="section-line-title">买家信息</div>
<section class="full-list">
  <a class="notice-row" href="chat-detail.html"><div class="buyer-info"><img class="avatar" src="../assets/avatars/a1.svg" alt="用户头像" /><div><div class="row-title">王小禾</div><div class="row-desc">收货地：浙江杭州 · 下单 18:24</div></div></div><span class="row-right">聊天<svg class="icon-sm" aria-hidden="true"><use href="../assets/icons.svg#chevron"></use></svg></span></a>
  <div class="notice-row"><div class="row-main"><div class="row-title">浙江省杭州市西湖区文三路 88 号</div><div class="row-desc">王小禾 138****8821</div></div><button class="pill-btn outline" data-toast="已复制地址">复制</button></div>
</section><div class="divider"></div>
<div class="section-line-title">商品</div>
<section class="full-list">
  <a class="product-list-item" href="product-edit.html"><img class="goods-img" src="../assets/goods/g2.svg" alt="商品图片" /><div class="product-list-body"><div class="product-list-head"><div class="product-list-title">湾源农仓 蓝莓礼盒 顺丰冷链装</div><span class="status-pill success">1件</span></div><div class="product-list-meta">规格：2kg礼盒 · 产地：云南</div><div class="product-list-bottom"><span class="必填-main">¥268.00</span><span class="row-right">含冷链包装</span></div></div></a>
</section><div class="divider"></div>
<div class="section-line-title">金额明细</div>
<section class="full-list">
  <div class="finance-row"><span>商品金额</span><strong>¥268.00</strong></div><div class="finance-row"><span>运费</span><strong>¥0.00</strong></div><div class="finance-row"><span>平台服务费</span><strong>-¥8.04</strong></div><div class="finance-row"><span>预计入账</span><strong class="status-text success">¥259.96</strong></div>
</section><div class="bottom-actions"><a class="action-btn secondary" href="chat-detail.html">联系买家</a><button class="action-btn" data-open-sheet="shipSheet">录入物流</button></div>
<div class="sheet-mask" data-sheet-mask></div><section class="sheet" id="shipSheet"><div class="sheet-head"><div class="sheet-title">录入物流</div><button class="icon-btn" data-close-sheet><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><div class="sheet-label">物流公司</div><div class="option-grid"><button class="option active">顺丰速运</button><button class="option ">中通快递</button><button class="option ">京东物流</button><button class="option ">其它</button></div></div><div class="sheet-group"><div class="sheet-label">发货方式</div><div class="option-grid"><button class="option active">快递发货</button><button class="option ">同城配送</button><button class="option ">无需物流</button></div></div><div class="bottom-actions" style="position:static;transform:none;padding:0;border-top:0"><button class="action-btn secondary" data-toast="已清空物流信息">清空</button><button class="action-btn" data-toast="已保存物流" data-close-sheet>保存物流</button></div></section>

</main>
<script src="../scripts/prototype.js"></script>
</body>
</html>
