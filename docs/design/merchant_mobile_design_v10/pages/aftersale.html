<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>售后管理</title><link rel="stylesheet" href="../styles/components.css" /></head>
<body>
<main class="app-page">

<div class="status-space"></div>
<header class="app-topbar"><a class="back-btn" href="workbench.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="search-pill"><svg class="icon-sm" aria-hidden="true"><use href="../assets/icons.svg#search"></use></svg><input data-search-input placeholder="搜索买家 / 订单号 / 商品" /></div><button class="icon-action" data-open-sheet="afterFilter"><svg class="icon"><use href="../assets/icons.svg#filter"></use></svg><span>筛选</span></button></header>
<nav class="tabs" data-filter-tabs><button class="tab active" data-filter="all"><span>全部</span></button><button class="tab" data-filter="pending"><span>待处理</span></button><button class="tab" data-filter="return"><span>退货中</span></button><button class="tab" data-filter="done"><span>已完成</span></button></nav>
<section data-filter-list><article class="order-item" data-status="pending" data-search="赵先生 仅退款 时令果蔬组合"><div class="buyer-row"><div class="buyer-info"><img class="avatar" src="../assets/avatars/a3.svg"/><div class="buyer-name">赵先生</div></div><span class="status-text danger">仅退款待处理</span></div><a class="product-row" href="refund.html"><img class="goods-img" src="../assets/goods/g1.svg"/><div class="product-main"><div class="product-title">时令果蔬组合</div><div class="product-sub">退款金额 ¥76.00 · 原因：不想要了</div></div><div class="product-必填">¥76</div></a><div class="item-actions"><a class="more-link" href="refund.html">详情</a><div class="btn-row"><button class="pill-btn" data-toast="已联系买家">联系买家</button><a class="pill-btn primary" href="refund.html">处理</a></div></div></article><article class="order-item" data-status="return" data-search="王女士 退货退款 蓝莓礼盒"><div class="buyer-row"><div class="buyer-info"><img class="avatar" src="../assets/avatars/a2.svg"/><div class="buyer-name">王女士</div></div><span class="status-text">退货中</span></div><a class="product-row" href="refund.html"><img class="goods-img" src="../assets/goods/g2.svg"/><div class="product-main"><div class="product-title">高山蓝莓礼盒</div><div class="product-sub">退货物流待买家填写</div></div><div class="product-必填">¥238</div></a><div class="item-actions"><a class="more-link" href="refund.html">详情</a><div class="btn-row"><button class="pill-btn" data-toast="已催买家寄回">催寄回</button></div></div></article><article class="order-item" data-status="done" data-search="周周 已完成 山货干货"><div class="buyer-row"><div class="buyer-info"><img class="avatar" src="../assets/avatars/a4.svg"/><div class="buyer-name">周周</div></div><span class="status-text success">已完成</span></div><a class="product-row" href="refund.html"><img class="goods-img" src="../assets/goods/g6.svg"/><div class="product-main"><div class="product-title">山货干货礼盒</div><div class="product-sub">退款 ¥20.00 · 协商补偿</div></div><div class="product-必填">¥20</div></a></article><div class="list-empty">没有匹配售后</div></section><div class="sheet-mask" data-sheet-mask></div><section class="sheet" id="afterFilter"><div class="sheet-head"><div class="sheet-title">售后筛选</div><button class="icon-btn" data-close-sheet><svg class="icon"><use href="../assets/icons.svg#close"></use></svg></button></div><div class="sheet-group"><div class="sheet-label">售后类型</div><div class="option-grid"><button class="option active">全部</button><button class="option">仅退款</button><button class="option">退货退款</button><button class="option">补偿</button></div></div><div class="bottom-actions" style="position:static;transform:none;padding:0;border-top:0"><button class="action-btn" data-close-sheet data-toast="已应用筛选">应用</button></div></section>
