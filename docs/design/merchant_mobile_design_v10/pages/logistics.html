<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>物流发货</title><link rel="stylesheet" href="../styles/components.css" /></head>
<body>
<main class="app-page no-bottom with-sticky">

<div class="status-space"></div>
<header class="page-titlebar"><a class="back-btn" href="order-detail.html"><svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#back"></use></svg></a><div class="title-block"><div class="page-title">物流发货</div><div class="page-subtitle">录入快递公司和运单号，支持复制与保存</div></div></header>
<section class="demo-card-list"><a class="demo-card" href="order-detail.html"><img src="../assets/goods/g2.svg"/><div><div class="demo-title">高山蓝莓礼盒 4盒装</div><div class="demo-desc">买家：李女士 · 订单 WY20260618001</div></div><div class="demo-right">¥268</div></a></section>
<div class="section-line-title"><span>物流信息</span></div><section class="full-list"><div class="form-line"><label>快递公司<span>必填</span></label><input value="顺丰速运" /></div><div class="form-line"><label>快递单号<span>必填</span></label><input value="SF938276451002" /></div><div class="form-line"><label>发货备注<span>选填</span></label><textarea>冷链发货，外箱已加固，预计 48 小时送达。</textarea></div></section>
<div class="section-line-title"><span>发货检查</span></div><section class="process-list"><div class="process-row done"><span class="process-index">1</span><span class="process-main"><strong>核对收货地址</strong><span>上海市浦东新区，手机号尾号 6321</span></span><span class="status-pill success">完成</span></div><div class="process-row done"><span class="process-index">2</span><span class="process-main"><strong>核对商品数量</strong><span>蓝莓礼盒 1 件，冰袋 2 个</span></span><span class="status-pill success">完成</span></div><div class="process-row"><span class="process-index">3</span><span class="process-main"><strong>上传物流单号</strong><span>保存后订单进入待收货状态</span></span><span class="status-pill warning">待保存</span></div></section>
<div class="bottom-actions"><button class="action-btn secondary" data-toast="已复制单号">复制单号</button><button class="action-btn" data-toast="已保存物流信息">保存发货</button></div>


</main>
<script src="../scripts/prototype.js"></script>
</body></html>
